name: wagyu-france

x-laravel-service: &laravel-service
  build:
    context: .
    dockerfile: Dockerfile
  working_dir: /var/www
  env_file:
    - .env
  volumes:
    - ./:/var/www
    - vendor_data:/var/www/vendor
  networks:
    - wagyu

services:
  app:
    <<: *laravel-service
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - wagyu

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    ports:
      - "${FORWARD_DB_PORT:-3307}:3306"
    environment:
      MYSQL_DATABASE: "${DB_DATABASE:-wagyu_france}"
      MYSQL_USER: "${DB_USERNAME:-wagyu}"
      MYSQL_PASSWORD: "${DB_PASSWORD:-wagyu_local}"
      MYSQL_ROOT_PASSWORD: "${DB_ROOT_PASSWORD:-root_local}"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s
    networks:
      - wagyu

  queue:
    <<: *laravel-service
    restart: unless-stopped
    command: >-
      sh -lc "until [ -f vendor/autoload.php ]; do sleep 2; done;
      php artisan queue:work --sleep=3 --tries=3 --timeout=90"
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started

  scheduler:
    <<: *laravel-service
    restart: unless-stopped
    command: >-
      sh -lc "until [ -f vendor/autoload.php ]; do sleep 2; done;
      php artisan schedule:work"
    depends_on:
      mysql:
        condition: service_healthy
      app:
        condition: service_started

  mailpit:
    image: axllent/mailpit:latest
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT:-8025}:8025"
    networks:
      - wagyu

  node:
    image: node:22-alpine
    profiles: ["tools"]
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - node_modules_data:/var/www/node_modules
    command: sh -lc "npm install && npm run build"
    networks:
      - wagyu

volumes:
  mysql_data:
  vendor_data:
  node_modules_data:

networks:
  wagyu:
    driver: bridge
